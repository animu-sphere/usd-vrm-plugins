# OpenStrata CI support matrix for usd-vrm-plugins.
#
# Policy: this file is the CI contract; .github/workflows/ost-*.yml are
# renderer output from `ost ci generate github`. Do not hand-edit CI
# semantics in the generated workflow YAML.
#
# Lanes:
#   - pull_request  -> GitHub-hosted source build from checkout. The runner
#                      bootstraps a pinned `ost` and pulls the runtime SDK from
#                      its OCI reference (runtime_remote) below.
#   - scheduled     -> self-hosted real compatibility validation from pinned
#                      runtime + plugin artifacts (air-gapped local import).
#
# Digest provenance (ost 0.10.0):
#   Windows runtime: OpenUSD 26.05 built from source with Python 3.13, validated,
#            exported slim with top-level resources/ and lib/python schema-gen deps.
#            OST artifact sha256:c1c54f1e... / OCI sha256:64fd1f44...
#   Linux runtime: OpenUSD 26.05 built from source in WSL with Python 3.13.14,
#            validated, exported slim from a symlink-dereferenced SDK re-adopt.
#            OST artifact sha256:be894c1b... / OCI sha256:7efc6e02...
#   plugin:  ost plugin publish plugins/usdVrm  (usdVrm 0.1.0)
schema: 1

bootstrap:
  ost:
    version: "0.10.0"
    repository: animu-sphere/open-strata

runners:
  windows-hosted:
    kind: github-hosted
    image: windows-2022
    billing:
      acknowledgement: required
  usd-windows-real:
    kind: self-hosted
    labels: [self-hosted, windows, x64, usd-26]
  linux-hosted:
    kind: github-hosted
    image: ubuntu-24.04
    billing:
      acknowledgement: required

cells:
  - name: usdvrm-pr-windows
    lane: pull_request
    runner: windows-hosted
    runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:64fd1f4404ef9a939d1cace1412d6998741ebf1774153250f97f9839617f784e
      expected_oci_digest: sha256:64fd1f4404ef9a939d1cace1412d6998741ebf1774153250f97f9839617f784e
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    up_to: 5

  - name: usdvrm-pr-linux
    lane: pull_request
    runner: linux-hosted
    runtime_artifact: sha256:be894c1b21844941f269a983e44a347132f4cbfb1cf851b27e01af846107c1a3
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:7efc6e020b0a2ae169c7609aba7d4c04b18edb44f78d9f631fd90c3f0ca07d81
      expected_oci_digest: sha256:7efc6e020b0a2ae169c7609aba7d4c04b18edb44f78d9f631fd90c3f0ca07d81
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    up_to: 5

  - name: usdvrm-support-windows-cy2026
    lane: scheduled
    runner: usd-windows-real
    runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
    plugin_artifact: sha256:1518387ae2cc51d3a0c1a9aee5f362c5cd8d5b2c6e7148523d23fd7b3fefa371
    platform: cy2026
    profile: usd
    up_to: 5
