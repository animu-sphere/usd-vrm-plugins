# OpenStrata CI support matrix for usd-vrm-plugins.
#
# Policy: this file is the CI contract; .github/workflows/ost-*.yml are
# renderer output from `ost ci generate github`. Do not hand-edit CI
# semantics in the generated workflow YAML.
#
# Lanes:
#   - pull_request  -> GitHub-hosted source build from checkout. The runner
#                      bootstraps a pinned `ost` and pulls the runtime SDK from
#                      its OCI reference (runtime_remote) below.
#   - scheduled     -> self-hosted real compatibility validation from pinned
#                      runtime + plugin artifacts (air-gapped local import).
#
# Digest provenance:
#   Windows runtime: OpenUSD 26.05 built from source with Python 3.13, validated,
#            exported slim with top-level resources/ and lib/python schema-gen deps.
#            OST artifact sha256:c1c54f1e... / OCI sha256:64fd1f44...
#   macOS arm64 runtime: OpenUSD 26.05 built from source with Python 3.13,
#            validated, exported slim with executable tool modes preserved,
#            and published publicly to GHCR.
#            OST artifact sha256:cddd365d... / OCI sha256:6117559a...
#            Requires ost 0.12.0+ for executable-bit preserving macOS
#            archive export/import.
#   Linux x86_64 runtime: OpenUSD 26.05 built from source with Python 3.13 inside
#            a ubuntu:24.04 (glibc 2.39) container so the runtime's real glibc
#            floor is 2.38 -- loadable on the github-hosted ubuntu-24.04 runner.
#            ost 0.12.0 measures the floor and stamps the honest target
#            linux-x86_64-glibc238-py313 (no longer a fabricated glibc228 label).
#            OST artifact sha256:f6a2047c... / OCI sha256:d202c6d7...
#            Published publicly to GHCR.
#   plugin:  ost plugin publish plugins/usdVrm  (usdVrm 0.1.0, ost 0.13.0 lean
#            package — reproducible digest, debug symbols split into *-debug)
schema: 1

bootstrap:
  ost:
    version: "0.14.0"
    repository: animu-sphere/open-strata

runners:
  windows-hosted:
    kind: github-hosted
    image: windows-2022
    billing:
      acknowledgement: required
  macos-arm64-hosted:
    kind: github-hosted
    image: macos-15
    billing:
      acknowledgement: required
  linux-hosted:
    kind: github-hosted
    image: ubuntu-24.04
    billing:
      acknowledgement: required
  usd-windows-real:
    kind: self-hosted
    labels: [self-hosted, windows, x64, usd-26]

cells:
  - name: usdvrm-pr-windows
    lane: pull_request
    runner: windows-hosted
    runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:64fd1f4404ef9a939d1cace1412d6998741ebf1774153250f97f9839617f784e
      expected_oci_digest: sha256:64fd1f4404ef9a939d1cace1412d6998741ebf1774153250f97f9839617f784e
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    up_to: 5

  - name: usdvrm-pr-macos-arm64
    lane: pull_request
    runner: macos-arm64-hosted
    runtime_artifact: sha256:cddd365d6e984c32250d6c5ae395fcc7cf870d07c9d432d756d99893ac971c52
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:6117559aa852eb7eb8eb20b86a1f48f894497be6d095e474f9a11a3a802cf876
      expected_oci_digest: sha256:6117559aa852eb7eb8eb20b86a1f48f894497be6d095e474f9a11a3a802cf876
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    host_python: "3.13"
    up_to: 5

  - name: usdvrm-pr-linux
    lane: pull_request
    runner: linux-hosted
    runtime_artifact: sha256:f6a2047c1681da4b4038f32d23b10f9713797a3f071945a799dedd73995739e5
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:d202c6d7534afa4960850419b58d3b06631d85031f93243cd5de6c4cf511a734
      expected_oci_digest: sha256:d202c6d7534afa4960850419b58d3b06631d85031f93243cd5de6c4cf511a734
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    host_python: "3.13"
    up_to: 5

  - name: usdvrm-support-windows-cy2026
    lane: scheduled
    runner: usd-windows-real
    runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
    plugin_artifact: sha256:87ee36e45f4b62693f7fe060c2236de938bcc63997cd3007e07d090af2c58b8d
    platform: cy2026
    profile: usd
    up_to: 5
