# OpenStrata CI support matrix for usd-vrm-plugins.
#
# Policy: this file is the CI contract; .github/workflows/ost-*.yml are
# renderer output from `ost ci generate github`. Do not hand-edit CI
# semantics in the generated workflow YAML.
#
# Lanes:
#   - pull_request  -> GitHub-hosted source build from checkout. The runner
#                      bootstraps a pinned `ost` and pulls the runtime SDK from
#                      its OCI reference (runtime_remote) below.
#   - scheduled     -> self-hosted real compatibility validation from pinned
#                      runtime + plugin artifacts (air-gapped local import).
#
# Digest provenance:
#   Windows runtime: OpenUSD 26.05 built from source with Python 3.13, validated,
#            exported slim with top-level resources/ and lib/python schema-gen deps.
#            OST artifact sha256:c1c54f1e... / OCI sha256:64fd1f44...
#   macOS arm64 runtime: OpenUSD 26.05 built from source with Python 3.13,
#            validated, exported slim, and published publicly to GHCR.
#            OST artifact sha256:64365b25... / OCI sha256:ee9d0774...
#            Requires ost 0.11.0+ for symlink-safe macOS archive import.
#   plugin:  ost plugin publish plugins/usdVrm  (usdVrm 0.1.0)
#
# A hosted Linux PR lane is intentionally deferred: the WSL/Ubuntu-26.04 Linux
# runtime was labeled glibc228 but its binaries require GLIBC_2.43, so it fails
# to load on the github-hosted ubuntu-24.04 runner (glibc 2.39). Re-add once the
# Linux runtime is rebuilt against an old glibc base. See v0.11.0 ask #7.
schema: 1

bootstrap:
  ost:
    version: "0.11.0"
    repository: animu-sphere/open-strata

runners:
  windows-hosted:
    kind: github-hosted
    image: windows-2022
    billing:
      acknowledgement: required
  macos-arm64-hosted:
    kind: github-hosted
    image: macos-15
    billing:
      acknowledgement: required
  usd-windows-real:
    kind: self-hosted
    labels: [self-hosted, windows, x64, usd-26]

cells:
  - name: usdvrm-pr-windows
    lane: pull_request
    runner: windows-hosted
    runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:64fd1f4404ef9a939d1cace1412d6998741ebf1774153250f97f9839617f784e
      expected_oci_digest: sha256:64fd1f4404ef9a939d1cace1412d6998741ebf1774153250f97f9839617f784e
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    up_to: 5

  - name: usdvrm-pr-macos-arm64
    lane: pull_request
    runner: macos-arm64-hosted
    runtime_artifact: sha256:64365b2597bab3c87e81501845b1cfe3c647758ace26336e34a17897c5aa573b
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:ee9d0774ab4ace4e5a1e76d16730ab0b2f203c8c4fdea4b8089fcb6e29d9f8f6
      expected_oci_digest: sha256:ee9d0774ab4ace4e5a1e76d16730ab0b2f203c8c4fdea4b8089fcb6e29d9f8f6
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    # The generated workflow currently carries temporary macOS pre-build steps
    # to add host Python 3.13 and repair runtime bin/ modes until the runtime
    # artifact is republished with executable bits preserved.
    up_to: 5

  - name: usdvrm-support-windows-cy2026
    lane: scheduled
    runner: usd-windows-real
    runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
    plugin_artifact: sha256:1518387ae2cc51d3a0c1a9aee5f362c5cd8d5b2c6e7148523d23fd7b3fefa371
    platform: cy2026
    profile: usd
    up_to: 5
