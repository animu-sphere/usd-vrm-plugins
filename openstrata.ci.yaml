# OpenStrata CI support matrix for usd-vrm-plugins.
#
# Policy: this file is the CI contract; .github/workflows/ost-*.yml are
# renderer output from `ost ci generate github`. Do not hand-edit CI
# semantics in the generated workflow YAML.
#
# Lanes:
#   - pull_request  -> GitHub-hosted source build from checkout. The runner
#                      bootstraps a pinned `ost` and pulls the runtime SDK from
#                      its OCI reference (runtime_remote) below.
#   - scheduled     -> self-hosted real compatibility validation from pinned
#                      runtime + plugin artifacts (air-gapped local import).
#
# Digest provenance:
#   All three runtimes were republished 2026-07-17 by .github/workflows/
#   runtime-republish.yml so they carry an SPDX SBOM and SLSA/in-toto
#   provenance: ost 0.16+ makes `ost ci generate` render `--require-sbom
#   --require-provenance` into every verify, and the originals predate evidence
#   generation. The republish re-exported the *already published* runtimes; it
#   did not rebuild OpenUSD. Windows/Linux exports are byte-reproducible, so
#   their artifact digests are unchanged and only the OCI reference moved (the
#   new manifest carries the evidence layers). macOS necessarily moved to a new
#   artifact digest because ost 0.12 changed macOS packing to preserve exec
#   bits. `file_count` was asserted equal to the source on all three, so the
#   payloads are the ones CI has always tested against.
#   Windows runtime: OpenUSD 26.05 built from source with Python 3.13, validated,
#            with top-level resources/ and lib/python schema-gen deps.
#            OST artifact sha256:c1c54f1e... / OCI sha256:e5e38405...
#            (artifact digest unchanged by the republish)
#   macOS arm64 runtime: OpenUSD 26.05 built from source with Python 3.13,
#            validated, with executable tool modes preserved,
#            and published publicly to GHCR.
#            OST artifact sha256:5630132e... / OCI sha256:00007f4b...
#            Requires ost 0.12.0+ for executable-bit preserving macOS
#            archive export/import.
#   Linux x86_64 runtime: OpenUSD 26.05 built from source with Python 3.13 inside
#            a ubuntu:24.04 (glibc 2.39) container so the runtime's real glibc
#            floor is 2.38 -- loadable on the github-hosted ubuntu-24.04 runner.
#            ost 0.12.0 measures the floor and stamps the honest target
#            linux-x86_64-glibc238-py313 (no longer a fabricated glibc228 label).
#            OST artifact sha256:f6a2047c... / OCI sha256:73a7d359...
#            (artifact digest unchanged by the republish)
#            Published publicly to GHCR.
#   plugin:  ost plugin publish plugins/usdVrm  (usdVrm 0.1.0, ost 0.13.0 lean
#            package — reproducible digest, debug symbols split into *-debug)
schema: 1

bootstrap:
  ost:
    version: "0.17.0"
    repository: animu-sphere/open-strata

runners:
  windows-hosted:
    kind: github-hosted
    image: windows-2022
    billing:
      acknowledgement: required
  macos-arm64-hosted:
    kind: github-hosted
    image: macos-15
    billing:
      acknowledgement: required
  linux-hosted:
    kind: github-hosted
    image: ubuntu-24.04
    billing:
      acknowledgement: required
  usd-windows-real:
    kind: self-hosted
    labels: [self-hosted, windows, x64, usd-26]

# ost 0.16+ makes both dependency edges executable: it consumes the
# `requires.bundles` closure (vrmSchema) AND the `requires.libraries` closure
# (the plain vrmContainer library, described by libs/vrmContainer/
# openstrata.library.yaml) for source build, test, run, and generated CI. Every
# consumer cell therefore exercises L0-L5 with its schema and library built,
# installed, and present in the session automatically — no repo-owned bootstrap
# or cell-local `with:` duplication.
#
# The Windows PR cells stay capped at L4: ost's hosted-Windows `usdcat --flatten
# --out` capture still injects semantic CR into multiline USDA string values
# (authored comments and generated `doc`) even from an LF-pinned fixture/golden,
# and the golden compare preserves semantic CRLF by design, so L5 mismatches.
# This is not reproducible on a local worktree; see the Phase 3 dogfood report.
# macOS and Linux cells run full L5. usdVrmPackageResolver's fixtures are chosen
# so its own L5 golden is host-independent, but its Windows cell is capped for
# consistency until the hosted-Windows capture is confirmed fixed.
cells:
  - name: usdvrm-pr-windows
    lane: pull_request
    runner: windows-hosted
    runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:e5e384053f6bed764d607eff401f3b240d3166fb968d791e8f82f307a6db4f4a
      expected_oci_digest: sha256:e5e384053f6bed764d607eff401f3b240d3166fb968d791e8f82f307a6db4f4a
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    up_to: 4

  - name: usdvrm-pr-macos-arm64
    lane: pull_request
    runner: macos-arm64-hosted
    runtime_artifact: sha256:5630132e617c5234fb7a6ddac97dd5716642eeedd096c919c007c81787f3facf
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:00007f4bbf70dbca2a8d67431181df1a56fd45406bf695727e4b6ef57bc57c97
      expected_oci_digest: sha256:00007f4bbf70dbca2a8d67431181df1a56fd45406bf695727e4b6ef57bc57c97
    bundle: plugins/usdVrm
