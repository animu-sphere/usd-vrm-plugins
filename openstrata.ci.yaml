# OpenStrata CI support matrix for usd-vrm-plugins.
#
# Policy: this file is the CI contract; .github/workflows/ost-*.yml are
# renderer output from `ost ci generate github`. Do not hand-edit CI
# semantics in the generated workflow YAML.
#
# Lanes:
#   - pull_request  -> GitHub-hosted source build from checkout. The runner
#                      bootstraps a pinned `ost` and pulls the runtime SDK from
#                      its OCI reference (runtime_remote) below.
#   - scheduled     -> self-hosted real compatibility validation from pinned
#                      runtime + plugin artifacts (air-gapped local import).
#
# Digest provenance (ost 0.9.0):
#   runtime: OpenUSD 26.05 built from source (build_scripts/build_usd.py,
#            Python 3.13) then exported slim: `ost runtime export cy2026
#            --profile usd --slim`. Published to GHCR (public) with oras:
#            oras push ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd:26.05-windows-x86_64 \
#              <archive>.tar.zst manifest.json SHA256SUMS \
#              --artifact-type application/vnd.openstrata.runtime.v1
#            Full export (not --slim): the SDK's top-level resources/ dir is
#            required by MaterialXConfig.cmake (find_package(pxr)->MaterialX), and
#            lib/python carries jinja2 so the bundled usdGenSchema runs in CI.
#            OST artifact digest sha256:28c2c00e… / OCI digest sha256:eda1b94d…
#   plugin:  ost plugin publish plugins/usdVrm  (usdVrm 0.1.0)
schema: 1

bootstrap:
  ost:
    version: "0.9.0"
    repository: animu-sphere/open-strata

runners:
  windows-hosted:
    kind: github-hosted
    image: windows-2022
    billing:
      acknowledgement: required
  usd-windows-real:
    kind: self-hosted
    labels: [self-hosted, windows, x64, usd-26]

cells:
  - name: usdvrm-pr-windows
    lane: pull_request
    runner: windows-hosted
    runtime_artifact: sha256:28c2c00e1b8296a92613780691e5ea2111431baef27add67d9107b4993be3094
    runtime_remote:
      uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:eda1b94df198bd32ee4e90b461daf9b38fea41d95be5abc18e3dec27429da2fe
      expected_oci_digest: sha256:eda1b94df198bd32ee4e90b461daf9b38fea41d95be5abc18e3dec27429da2fe
    bundle: plugins/usdVrm
    platform: cy2026
    profile: usd
    up_to: 5

  - name: usdvrm-support-windows-cy2026
    lane: scheduled
    runner: usd-windows-real
    runtime_artifact: sha256:28c2c00e1b8296a92613780691e5ea2111431baef27add67d9107b4993be3094
    plugin_artifact: sha256:848816f7d8f04031590cde745340c8536ad03ce3977278c685abe7640cdf9039
    platform: cy2026
    profile: usd
    up_to: 5
