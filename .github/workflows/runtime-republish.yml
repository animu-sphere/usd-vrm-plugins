# Runtime republish (hand-authored, manual trigger only).
#
# WHY THIS EXISTS
# ---------------
# The cy2026/usd runtime images pinned by openstrata.ci.yaml carry no SPDX SBOM
# and no SLSA/in-toto provenance: they were published before ost could generate
# either. (Do not try to date them from an artifact record's `producer` field —
# ArtifactStore::import stamps that with the version of ost doing the *import*,
# not the one that produced the archive, so it differs per machine.) Since ost
# 0.16/0.17, `ost ci generate` unconditionally emits
#
#     ost artifact verify <digest> --minimum-trust <t> --require-sbom --require-provenance
#
# so every generated PR cell fails at "Verify and materialize the pinned runtime
# SDK" with ARTIFACT_SBOM_REQUIRED / ARTIFACT_PROVENANCE_REQUIRED (exit 5).
#
# WHAT THIS DOES *NOT* DO
# -----------------------
# It does not build OpenUSD. The published binaries are fine; only the artifact
# wrapper lacks evidence. This job re-materializes the *already published*
# runtime from its pinned digest and re-exports it through ost 0.17.0, which
# regenerates the archive together with its evidence sidecars. A file-count
# guard below proves the contents round-tripped unchanged.
#
# WHY IT MUST RUN ON GITHUB ACTIONS
# ---------------------------------
# `ost runtime export` writes provenance only when the producer manifest carries
# build metadata, and that metadata comes from `github_build_metadata()`, which
# reads GITHUB_REPOSITORY / GITHUB_SHA / GITHUB_WORKFLOW_REF / GITHUB_REF /
# GITHUB_ACTOR / GITHUB_EVENT_NAME. Outside Actions it returns None and no
# provenance is written. A local re-export therefore gets an SBOM but can never
# satisfy --require-provenance. This workflow is the only place that can.
#
# AFTER A GREEN RUN
# -----------------
# Copy the emitted (artifact digest, OCI digest) pairs into openstrata.ci.yaml,
# then regenerate the workflows with `ost ci generate github --force`.
#
# NOTE ON THE ost PIN
# -------------------
# This workflow pins ost 0.17.0 independently of openstrata.ci.yaml's
# `bootstrap.ost.version`, and may legitimately be ahead of it: producing
# evidence is exactly what the newer ost adds, so the republish tool cannot be
# pinned to whatever version the matrix currently bootstraps.
name: runtime republish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Re-export and verify, but do NOT push to GHCR"
        type: boolean
        default: true

# Publishing is the only write this workflow performs.
permissions:
  contents: read
  packages: write

jobs:
  republish:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    env:
      # Scope the registry to the workspace: the eviction step below deletes it
      # outright, and that must never reach a shared ~/.ost.
      OST_HOME: ${{ github.workspace }}/.ost-ci-home
    strategy:
      # One broken platform must not hide the state of the others.
      fail-fast: false
      matrix:
        include:
          - name: runtime-republish-windows
            runs_on: windows-2022
            platform: cy2026
            profile: usd
            # The currently pinned pair from openstrata.ci.yaml. `artifact` is
            # the ost-native digest (the CI contract); `oci` is the manifest
            # digest that addresses it in GHCR. They are different by design.
            artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
            oci: sha256:64fd1f4404ef9a939d1cace1412d6998741ebf1774153250f97f9839617f784e
            # Contents guard: the re-export must carry exactly this many files
            # (observed on the published artifact at authoring time).
            file_count: 4045
            tag: 26.05-windows-x86_64-attested
          - name: runtime-republish-macos-arm64
            runs_on: macos-15
            platform: cy2026
            profile: usd
            artifact: sha256:cddd365d6e984c32250d6c5ae395fcc7cf870d07c9d432d756d99893ac971c52
            oci: sha256:6117559aa852eb7eb8eb20b86a1f48f894497be6d095e474f9a11a3a802cf876
            file_count: 0  # measured from the pulled artifact; see the guard step
            tag: 26.05-macos-arm64-attested
          - name: runtime-republish-linux
            runs_on: ubuntu-24.04
            platform: cy2026
            profile: usd
            artifact: sha256:f6a2047c1681da4b4038f32d23b10f9713797a3f071945a799dedd73995739e5
            oci: sha256:d202c6d7534afa4960850419b58d3b06631d85031f93243cd5de6c4cf511a734
            file_count: 0
            tag: 26.05-linux-x86_64-attested
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Bootstrap ost 0.17.0 (pinned release asset, checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64)   triple=x86_64-unknown-linux-musl ; ext=tar.xz ;;
            macOS-ARM64) triple=aarch64-apple-darwin ; ext=tar.xz ;;
            macOS-X64)   triple=x86_64-apple-darwin ; ext=tar.xz ;;
            Windows-X64) triple=x86_64-pc-windows-msvc ; ext=zip ;;
            *) echo "::error title=ost bootstrap::no ost release asset for ${RUNNER_OS}-${RUNNER_ARCH}" ; exit 1 ;;
          esac
          asset="ost-cli-${triple}.${ext}"
          base="https://github.com/animu-sphere/open-strata/releases/download/v0.17.0"
          curl -fsSLo "$asset" "$base/$asset"
          curl -fsSLo "$asset.sha256" "$base/$asset.sha256"
          actual="$( (command -v sha256sum > /dev/null && sha256sum "$asset" || shasum -a 256 "$asset") | cut -d' ' -f1 )"
          published="$(cut -d' ' -f1 "$asset.sha256")"
          if [ "$actual" != "$published" ]; then
            echo "::error title=ost bootstrap::$asset hashes to $actual but the release publishes $published" ; exit 1
          fi
          mkdir -p .ost-ci/bootstrap-bin
          if [ "$ext" = "zip" ]; then
            powershell -NoProfile -Command "Expand-Archive -LiteralPath '$asset' -DestinationPath '.ost-ci/bootstrap-bin' -Force"
          else
            tar -xf "$asset" -C .ost-ci/bootstrap-bin
          fi
          bin="$(find .ost-ci/bootstrap-bin -type f \( -name ost -o -name ost.exe \) | head -n 1)"
          if [ -z "$bin" ]; then echo "::error title=ost bootstrap::no ost binary inside $asset" ; exit 1 ; fi
          chmod +x "$bin" 2> /dev/null || true
          bindir="$(cd "$(dirname "$bin")" && pwd)"
          if command -v cygpath > /dev/null; then bindir="$(cygpath -w "$bindir")"; fi
          echo "$bindir" >> "$GITHUB_PATH"

      - name: Check ost is available
        shell: bash
        run: |
          set -euo pipefail
          version="$(ost --version)"
          echo "$version"
          if [ "$version" != "ost 0.17.0" ]; then
            echo "::error title=ost bootstrap::expected 'ost 0.17.0', got '$version'" ; exit 1
          fi

      - name: Pull the currently published runtime (digest-pinned)
        shell: bash
        run: |
          set -euo pipefail
          # --expect-artifact pins the exact ost-native digest, which *is* the
          # artifact's identity, so it subsumes any --require-target check.
          ost artifact pull "oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@${{ matrix.oci }}" \
            --expect-artifact "${{ matrix.artifact }}" \
            --require-kind runtime
          # Record the source contents so the re-export can be proven faithful.
          ost artifact show "${{ matrix.artifact }}" --json > before.json
          before_files="$(jq -r '.data.artifact.file_count' before.json)"
          echo "source file_count: $before_files"
          echo "BEFORE_FILES=$before_files" >> "$GITHUB_ENV"

      - name: Confirm the published runtime is what the PR lane rejects
        shell: bash
        run: |
          set -euo pipefail
          # Not a gate — evidence for the report. This is expected to fail with
          # ARTIFACT_SBOM_REQUIRED / ARTIFACT_PROVENANCE_REQUIRED, which is the
          # whole reason this workflow exists.
          if ost artifact verify "${{ matrix.artifact }}" --minimum-trust local \
               --require-sbom --require-provenance; then
            echo "::warning title=republish::the published runtime already carries evidence; this republish may be unnecessary"
          else
            echo "confirmed: the published runtime has no attached evidence (expected)"
          fi

      - name: Materialize and validate the runtime
        shell: bash
        run: |
          set -euo pipefail
          ost runtime pull "${{ matrix.platform }}" --profile "${{ matrix.profile }}" \
            --from-artifact "${{ matrix.artifact }}" --force
          # `runtime export` refuses an unvalidated runtime.
          ost runtime validate "${{ matrix.platform }}" --profile "${{ matrix.profile }}" --json > /dev/null
          ost runtime show "${{ matrix.platform }}" --profile "${{ matrix.profile }}"

      - name: Evict the evidence-less record before re-exporting
        shell: bash
        run: |
          set -euo pipefail
          # Without this, the whole workflow is a no-op on any platform whose
          # export is byte-reproducible (Linux and Windows; macOS differs only
          # because ost 0.12 changed macOS archive packing to preserve exec
          # bits, so a 0.17 re-export of a 0.10-era artifact lands on a new
          # digest there).
          #
          # ArtifactStore::import short-circuits when the archive digest is
          # already in the registry, and it only attaches the incoming evidence
          # sidecars if the producer manifest is byte-identical to the stored
          # one. A re-export by a newer ost always changes that manifest (the
          # `producer` string, plus the `build` metadata generate_evidence adds
          # under Actions), so the guard never matches: the freshly generated
          # SBOM and provenance are dropped, the evidence-less record is
          # returned as `already_present: true`, and the command still reports
          # success. Observed on run 29514114428, where the Linux/Windows
          # "new" digests came back identical to the pins they were meant to
          # replace and verification still failed ARTIFACT_SBOM_REQUIRED.
          #
          # The runtime store is a sibling of the artifact store, so dropping
          # the registry keeps the runtime materialized above intact and forces
          # the export's import onto the fresh path, which does write evidence.
          # The archive bytes are unchanged, so the artifact digest is
          # unchanged too: this attaches evidence to the exact digest CI
          # already pins, rather than minting a different runtime.
          rm -rf "$OST_HOME/artifacts"
          ost artifact list || true

      - name: Re-export through ost 0.17.0 (regenerates SBOM + provenance)
        shell: bash
        run: |
          set -euo pipefail
          # NOT --slim. Slim drops the top-level resources/ tree (MaterialX
          # data) and then find_package(pxr) -> MaterialXConfig.cmake
          # set_and_check(<prefix>/resources) fails to configure. This repo
          # publishes the full SDK layout; the adopted root has no build/src
          # tree, so it stays reasonably sized.
          ost runtime export "${{ matrix.platform }}" --profile "${{ matrix.profile }}" \
            --dist dist --json > export.json
          digest="$(jq -r '.data.digest' export.json)"
          layout="$(jq -r '.data.layout_profile' export.json)"
          files="$(jq -r '.data.files' export.json)"
          already="$(jq -r '.data.already_present' export.json)"
          echo "new artifact digest: $digest (layout=$layout, files=$files, already_present=$already)"
          if [ "$layout" != "full" ]; then
            echo "::error title=republish::exported layout_profile is '$layout', expected 'full'" ; exit 1
          fi
          # The eviction above exists precisely so this is false. If the record
          # was still present, import took the short-circuit and silently
          # discarded the evidence we just generated; the verify below would
          # fail anyway, but fail here where the cause is legible.
          if [ "$already" != "false" ]; then
            echo "::error title=republish::already_present=$already after eviction; the evidence sidecars were dropped" ; exit 1
          fi
          # Sanity: the sidecars must actually exist on disk.
          for f in sbom.spdx.json provenance.intoto.jsonl; do
            if [ ! -s "dist/$f" ]; then
              echo "::error title=republish::dist/$f is missing or empty" ; exit 1
            fi
          done
          echo "NEW_ARTIFACT=$digest" >> "$GITHUB_ENV"
          echo "NEW_FILES=$files" >> "$GITHUB_ENV"
          ls -la dist

      - name: Prove the contents round-tripped unchanged
        shell: bash
        run: |
          set -euo pipefail
          # The point of this workflow is to change the wrapper, never the
          # payload. If the file count moved, the re-export is not a faithful
          # republish of what CI already trusts, and the new digest must not be
          # pinned. (The declared matrix count, when non-zero, is a second
          # independent pin against the value observed at authoring time.)
          after="$NEW_FILES"
          echo "before=$BEFORE_FILES after=$after declared=${{ matrix.file_count }}"
          if [ "$after" != "$BEFORE_FILES" ]; then
            echo "::error title=republish::file_count changed ($BEFORE_FILES -> $after); the re-export is not faithful" ; exit 1
          fi
          if [ "${{ matrix.file_count }}" != "0" ] && [ "$after" != "${{ matrix.file_count }}" ]; then
            echo "::error title=republish::file_count $after does not match the declared ${{ matrix.file_count }}" ; exit 1
          fi

      - name: Verify the new artifact with the gate CI actually uses
        shell: bash
        run: |
          set -euo pipefail
          # Exactly the command `ost ci generate` emits. This is the check that
          # currently fails on the published runtime; it must pass here, or
          # republishing solves nothing.
          ost artifact verify "$NEW_ARTIFACT" --minimum-trust local \
            --require-sbom --require-provenance

      - name: Push to GHCR
        if: ${{ !inputs.dry_run }}
        shell: bash
        env:
          # ost does not read the docker/oras credential store.
          OST_REGISTRY_USER: ${{ github.actor }}
          OST_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # A new tag: never repoint the tag the current pins were published
          # under. Digests are immutable, so the existing runtime stays pullable
          # for any lane not yet migrated.
          #
          # Do not let `--json > file` swallow the diagnosis: on failure ost's
          # report is the only thing that says *why*, and redirecting stdout
          # under `set -e` threw it away along with the exit code (run
          # 29515268807 failed here with a bare "exit code 4" and no message).
          set +e
          ost artifact push "$NEW_ARTIFACT" \
            "oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd:${{ matrix.tag }}" \
            --json > push.json 2> push.err
          rc=$?
          set -e
          echo "--- stdout ---" ; cat push.json 2> /dev/null || true
          echo "--- stderr ---" ; cat push.err  2> /dev/null || true
          if [ "$rc" -ne 0 ]; then
            code="$(jq -r '.error.code // .code // "unknown"' push.json 2> /dev/null || echo unknown)"
            echo "::error title=republish::ost artifact push exited $rc (code=$code); see stdout/stderr above"
            exit "$rc"
          fi
          oci="$(jq -r '.data.oci_digest' push.json)"
          pushed_artifact="$(jq -r '.data.artifact_digest' push.json)"
          if [ "$pushed_artifact" != "$NEW_ARTIFACT" ]; then
            echo "::error title=republish::pushed $pushed_artifact but exported $NEW_ARTIFACT" ; exit 1
          fi
          echo "NEW_OCI=$oci" >> "$GITHUB_ENV"

      - name: Emit the new pins
        if: ${{ always() && env.NEW_ARTIFACT != '' }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### ${{ matrix.name }}"
            echo
            echo '```yaml'
            echo "runtime_artifact: $NEW_ARTIFACT"
            if [ -n "${NEW_OCI:-}" ]; then
              echo "runtime_remote:"
              echo "  uri: oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@$NEW_OCI"
              echo "  expected_oci_digest: $NEW_OCI"
            else
              echo "# dry run: not pushed, no OCI digest yet"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload the producer output
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: republish-${{ matrix.name }}
          # The archive itself is large and already in the registry; keep the
          # evidence and the records, which is what a reviewer needs.
          path: |
            dist/manifest.json
            dist/SHA256SUMS
            dist/sbom.spdx.json
            dist/provenance.intoto.jsonl
            export.json
            before.json
            push.json
            push.err
          if-no-files-found: warn
