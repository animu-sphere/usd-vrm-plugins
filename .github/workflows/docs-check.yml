# Hand-authored (not generated by `ost ci generate`).
#
# Documentation consistency: asserts the contract values the docs restate from
# the manifests, and that every local link resolves. Deliberately cheap — no
# runtime, no `ost`, no OpenUSD — so it can gate every PR in seconds.
#
# It does not generate documentation. The docs are hand-written; this only
# catches the facts that rot silently when the workspace changes shape.
name: docs-check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/openstrata.plugin.yaml"
      - "**/openstrata.library.yaml"
      - "scripts/check_docs.py"
      - ".github/workflows/docs-check.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/openstrata.plugin.yaml"
      - "**/openstrata.library.yaml"
      - "scripts/check_docs.py"
      - ".github/workflows/docs-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    name: docs consistency
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Check docs against the manifests
        run: python scripts/check_docs.py
