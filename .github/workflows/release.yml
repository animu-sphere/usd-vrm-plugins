# Release workflow (hand-authored). The ost-*.yml workflows are generated from
# openstrata.ci.yaml; this one is not — but its runtime/bootstrap pins MIRROR
# openstrata.ci.yaml, so update both together.
#
# Pushing a tag `vX.Y.Z` (which must equal the repo VERSION file and have a
# finalized CHANGELOG section) builds the whole workspace -- vrmSchema,
# usdVrmFileFormat, usdVrmPackageResolver -- on the same three OS cells and
# digest-pinned runtimes as the PR lane, proves the *packaged* artifacts
# (composed clean-install smoke + digest reproducibility), then assembles a
# DRAFT GitHub release: per-target lean bundles + manifest sidecars for all
# three, a source archive, SHA256SUMS, and notes rendered from CHANGELOG.md via
# docs/contributing/RELEASE_NOTES_TEMPLATE.md. Publishing the draft is a human
# decision.
#
# All three bundles ship together because they must: an usdVrmFileFormat package
# on its own registers the `.vrm` format but cannot open a stage (see the
# comment on the clean-install smoke step, and ost report 23).
#
# `workflow_dispatch` is a dry run: the same build/verify/package lanes, with
# everything uploaded as workflow artifacts and no release object created.
#
# Fork-PR safety: runs only on tag push / manual dispatch, never on
# pull_request; the token stays read-only except for the release job.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: preflight (tag = VERSION, changelog finalized)
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve the release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$file_version" ]; then
              echo "::error title=release preflight::tag ${GITHUB_REF_NAME} does not match VERSION file ($file_version)" ; exit 1
            fi
            echo "version=$tag_version" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$file_version" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check the changelog section renders (finalized on a real release)
        shell: bash
        run: |
          set -euo pipefail
          extra=""
          if [ "${{ steps.version.outputs.is_release }}" != "true" ]; then
            extra="--allow-unreleased"
          fi
          python3 scripts/make_release_notes.py --version "${{ steps.version.outputs.version }}" $extra > /dev/null

  build:
    name: ${{ matrix.name }}
    needs: preflight
    runs-on: ${{ matrix.runs_on }}
    env:
      OST_HOME: ${{ format('{0}/.ost-ci-home', github.workspace) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release-windows
            cache_cell: usdvrmfileformat-pr-windows
            runtime_artifact: sha256:c1c54f1e8a31983ad24f2997e419b000d4ad5d030c392d592d20fd6c8ac8b227
            runtime_remote: "oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:bf24d8b6af28d3b3be0fc780803da0ae1181fca8f336ee0c79c1b1607073f724"
            platform: cy2026
            profile: usd
            runs_on: ["windows-2022"]
            # The Windows runtime does not bundle python.exe: `ost plugin run
            # -- python` resolves the host PATH python, which must match the
            # runtime's py313 ABI for the clean-install smoke (`from pxr
            # import ...`). The runner's default python is 3.12 -> pin 3.13.
            host_python: "3.13"
          - name: release-macos-arm64
            cache_cell: usdvrmfileformat-pr-macos-arm64
            runtime_artifact: sha256:5630132e617c5234fb7a6ddac97dd5716642eeedd096c919c007c81787f3facf
            runtime_remote: "oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:459ec9a3930dede19b5c8f2ccf2fcdf9b8645fb9c95773e37b25f35ca30ee873"
            platform: cy2026
            profile: usd
            runs_on: ["macos-15"]
            host_python: "3.13"
          - name: release-linux
            cache_cell: usdvrmfileformat-pr-linux
            runtime_artifact: sha256:f6a2047c1681da4b4038f32d23b10f9713797a3f071945a799dedd73995739e5
            runtime_remote: "oci://ghcr.io/animu-sphere/openstrata-runtime-cy2026-usd@sha256:3f785e3088e8701f653b2470c33ef384bcd79dff3781dd69aa861984225a7fa8"
            platform: cy2026
            profile: usd
            runs_on: ["ubuntu-24.04"]
            host_python: "3.13"
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Bootstrap ost 0.18.0 (pinned release asset, checksum-verified)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ost-ci
          case "${RUNNER_OS}-${RUNNER_ARCH}" in
            Linux-X64)   triple=x86_64-unknown-linux-musl ; ext=tar.xz ;;
            macOS-ARM64) triple=aarch64-apple-darwin ; ext=tar.xz ;;
            macOS-X64)   triple=x86_64-apple-darwin ; ext=tar.xz ;;
            Windows-X64) triple=x86_64-pc-windows-msvc ; ext=zip ;;
            *) echo "::error title=ost bootstrap::no ost release asset for ${RUNNER_OS}-${RUNNER_ARCH}" ; exit 1 ;;
          esac
          asset="ost-cli-${triple}.${ext}"
          base="https://github.com/animu-sphere/open-strata/releases/download/v0.18.0"
          curl -fsSLo "$asset" "$base/$asset"
          curl -fsSLo "$asset.sha256" "$base/$asset.sha256"
          actual="$( (command -v sha256sum > /dev/null && sha256sum "$asset" || shasum -a 256 "$asset") | cut -d' ' -f1 )"
          published="$(cut -d' ' -f1 "$asset.sha256")"
          if [ "$actual" != "$published" ]; then
            echo "::error title=ost bootstrap::$asset hashes to $actual but the release publishes $published" ; exit 1
          fi
          mkdir -p .ost-ci/bootstrap-bin
          if [ "$ext" = "zip" ]; then
            powershell -NoProfile -Command "Expand-Archive -LiteralPath '$asset' -DestinationPath '.ost-ci/bootstrap-bin' -Force"
          else
            tar -xf "$asset" -C .ost-ci/bootstrap-bin
          fi
          bin="$(find .ost-ci/bootstrap-bin -type f \( -name ost -o -name ost.exe \) | head -n 1)"
          if [ -z "$bin" ]; then echo "::error title=ost bootstrap::no ost binary inside $asset" ; exit 1 ; fi
          chmod +x "$bin" 2> /dev/null || true
          bindir="$(cd "$(dirname "$bin")" && pwd)"
          # GITHUB_PATH must hold a native path: a POSIX /d/a/... entry is
          # visible to bash but not to Windows CreateProcess (python subprocess
          # spawning `ost` in the clean-install smoke would fail).
          if command -v cygpath > /dev/null; then bindir="$(cygpath -w "$bindir")"; fi
          echo "$bindir" >> "$GITHUB_PATH"
      - name: Check ost is available
        shell: bash
        run: |
          set -euo pipefail
          version="$(ost --version)"
          echo "$version"
          if [ "$version" != "ost 0.18.0" ]; then
            echo "::error title=ost bootstrap::expected 'ost 0.18.0', got '$version'" ; exit 1
          fi
      - name: Restore the artifact registry cache (speed only, never correctness)
        if: ${{ vars.OST_CI_DISABLE_CACHE != 'true' }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ost-ci-home/artifacts
          key: ost-registry-0.18.0-${{ runner.os }}-${{ runner.arch }}-${{ matrix.cache_cell }}-${{ matrix.runtime_artifact }}
      - name: Pull the pinned runtime SDK from its remote reference
        shell: bash
        run: |
          set -euo pipefail
          # The cache-hit test must use the SAME predicate as the gate below.
          # A cached record that verifies without evidence but fails the gate
          # would skip the pull and wedge the lane on every subsequent run,
          # because `ost artifact pull` cannot add evidence to a digest already
          # in the registry (import short-circuits on already_present and drops
          # the sidecars, printing "skipped sbom"). Failing this test instead
          # drops through to the eviction + fresh pull, which does attach it.
          if ost artifact show "${{ matrix.runtime_artifact }}" --json > /dev/null 2>&1 \
             && ost artifact verify "${{ matrix.runtime_artifact }}" --minimum-trust local \
                  --require-sbom --require-provenance --json > /dev/null; then
            echo "pinned runtime already present and verified (cache hit) -- skipping the remote pull"
          else
            rm -rf "${OST_HOME}/artifacts"
            ost artifact pull "${{ matrix.runtime_remote }}" --expect-artifact "${{ matrix.runtime_artifact }}" --require-kind runtime --json
          fi
      - name: Verify and materialize the pinned runtime SDK
        shell: bash
        run: |
          set -euo pipefail
          # Mirrors the gate `ost ci generate` renders into the PR lanes: the
          # release lane must not verify the runtime more weakly than the lane
          # that gates the PRs feeding it.
          ost artifact verify ${{ matrix.runtime_artifact }} --minimum-trust local --require-sbom --require-provenance
          ost runtime pull ${{ matrix.platform }} --profile ${{ matrix.profile }} --from-artifact ${{ matrix.runtime_artifact }} --force
          ost runtime validate ${{ matrix.platform }} --profile ${{ matrix.profile }} --json > /dev/null
      - name: Set up host Python for schema tooling
        if: ${{ matrix.host_python != '' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.host_python }}
      # The release ships the whole workspace, not just the importer: since the
      # Phase 1 schema split an `usdVrmFileFormat` package alone registers the
      # `.vrm` format but cannot open a stage (ost stages a dependency bundle's
      # link half without its USD registration half). Build in dependency order;
      # `--workspace` exists on `test`/`package` but not on `build`.
      - name: Build every bundle from source (dependency order)
        shell: bash
        run: |
          set -euo pipefail
          for bundle in plugins/vrmSchema plugins/usdVrmFileFormat plugins/usdVrmPackageResolver; do
            echo "::group::build $bundle"
            ost plugin build "$bundle" --target ${{ matrix.platform }} --profile ${{ matrix.profile }}
            echo "::endgroup::"
          done
      - name: Run the verification pyramid against the build tree (whole workspace)
        shell: bash
        run: ost plugin test --workspace --target ${{ matrix.platform }} --profile ${{ matrix.profile }} --up-to 5 --json
      - name: Package the workspace (lean bundles + split debug symbols)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ost-ci
          ost plugin package --workspace --target ${{ matrix.platform }} --profile ${{ matrix.profile }} --json | tee .ost-ci/package.json
      - name: Prove packaging is digest-reproducible
        shell: bash
        run: |
          set -euo pipefail
          digests() { jq -r '.data.packages[] | "\(.name) \(.archive_digest)"' "$1" | sort; }
          digests .ost-ci/package.json > .ost-ci/digests-first.txt
          ost plugin package --workspace --target ${{ matrix.platform }} --profile ${{ matrix.profile }} --json > .ost-ci/package-second.json
          digests .ost-ci/package-second.json > .ost-ci/digests-second.txt
          if ! diff -u .ost-ci/digests-first.txt .ost-ci/digests-second.txt; then
            echo "::error title=release packaging::two packaging runs of the same build disagree -- release checksums would be unstable" ; exit 1
          fi
          cat .ost-ci/digests-first.txt
      # NOT `ost plugin test --from-package`: that verb takes a single bundle and
      # is documented incompatible with `--workspace`, so it would test the
      # importer package in isolation -- the one configuration that provably
      # fails (L3/L4, "Used null prim") because vrmSchema's plugInfo.json and
      # generatedSchema.usda are not staged into it. The clean-install smoke is
      # the stronger gate anyway: it composes all three *packaged* artifacts and
      # opens, validates, and texture-resolves real models. See ost report 23.
      - name: Verify the packaged artifacts, composed (clean-install smoke)
        shell: bash
        run: python scripts/clean_install_smoke.py --skip-build
      - name: Stage the release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.preflight.outputs.version }}"
          mkdir -p release-stage
          count="$(jq -r '.data.packages | length' .ost-ci/package.json)"
          if [ "$count" -ne 3 ]; then
            echo "::error title=release packaging::expected 3 workspace packages, got $count" ; exit 1
          fi
          for i in $(seq 0 $((count - 1))); do
            archive="$(jq -r ".data.packages[$i].archive" .ost-ci/package.json)"
            name="$(jq -r ".data.packages[$i].name" .ost-ci/package.json)"
            target="$(jq -r ".data.packages[$i].target" .ost-ci/package.json)"
            debug="$(jq -r ".data.packages[$i].debug_archive // empty" .ost-ci/package.json)"
            if command -v cygpath > /dev/null; then archive="$(cygpath -u "$archive")"; fi
            dist_dir="$(dirname "$archive")"
            cp "$archive" release-stage/
            if [ -n "$debug" ]; then
              if command -v cygpath > /dev/null; then debug="$(cygpath -u "$debug")"; fi
              # `debug_archive` may be a bare filename or a full path.
              case "$debug" in */*) cp "$debug" release-stage/ ;; *) cp "$dist_dir/$debug" release-stage/ ;; esac
            fi
            cp "$dist_dir/manifest.json" "release-stage/${name}-${version}-${target}.manifest.json"
          done
          ls -l release-stage/
      - name: Upload the staged artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.name }}
          path: release-stage/
          if-no-files-found: error

  release:
    name: assemble release (draft)
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download the per-target artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: release-*
          path: dist-release
          merge-multiple: true
      - name: Add the source archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.preflight.outputs.version }}"
          git archive --format=tar.gz --prefix="usd-vrm-plugins-${version}/" \
            -o "dist-release/usd-vrm-plugins-${version}-src.tar.gz" HEAD
      - name: Write SHA256SUMS over every release file
        shell: bash
        run: |
          set -euo pipefail
          cd dist-release
          rm -f SHA256SUMS
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Render the release notes from the changelog
        shell: bash
        run: |
          set -euo pipefail
          extra=""
          if [ "${{ needs.preflight.outputs.is_release }}" != "true" ]; then
            extra="--allow-unreleased"
          fi
          python3 scripts/make_release_notes.py \
            --version "${{ needs.preflight.outputs.version }}" \
            --checksums dist-release/SHA256SUMS \
            --out release-notes.md $extra
          cat release-notes.md
      - name: Create the draft GitHub release
        if: ${{ needs.preflight.outputs.is_release == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${{ needs.preflight.outputs.version }}"
          gh release create "$tag" \
            --draft \
            --title "usd-vrm-plugins $tag" \
            --notes-file release-notes.md \
            dist-release/*
      - name: Upload the dry-run bundle (workflow_dispatch only)
        if: ${{ needs.preflight.outputs.is_release != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-dry-run
          path: |
            dist-release/
            release-notes.md
