# OpenStrata plugin bundle manifest.
# A plugin is a self-describing bundle, not a bare shared library: this file is
# the contract `ost plugin inspect|build|doctor|test` resolve against.
manifest:
  schema: openstrata.plugin/v1alpha1
plugin:
  name: usdVrm
  version: 0.1.0
  kind: usd-fileformat
license: Apache-2.0
runtime:
  # The OpenUSD version range this plugin tolerates. The runtime supplies the
  # certified point within it. Authored against 25.05; verified against 26.08.
  openusd: ">=25.05,<27.0"
  # Source bundles inherit the resolved runtime ABI. This keeps the manifest
  # portable across Windows (msvc143), macOS (libcxx), and Linux (libstdcxx)
  # while still letting `ost plugin doctor` enforce the concrete target ABI.
  cxx_abi: inherit
provides:
  - usd-fileformat:vrm
requires:
  capabilities: [usd-stage-read]
  # Executable in ost 0.16.0: the workspace graph validates this edge against
  # libs/vrmContainer/openstrata.library.yaml; build/test/run compose the
  # library into the workspace prefix + session, and `plugin package` stages
  # its runtime under runtime/libraries/ with a dependencies.json record (the
  # repo-owned runtime/lib copy + requires.runtime_libs adapter from the
  # ost 0.15 era is gone).
  libraries:
    - id: vrmContainer
      version: ">=0.1,<0.2"
  # The typed Vrm*API schemas moved to the vrmSchema bundle (workspace Phase 1,
  # docs/architecture/WORKSPACE.md §1). The contract pin selects the
  # authored-data contract, independent of the implementation version (§3).
  bundles:
    - id: vrmSchema
      version: ">=0.1,<0.2"
      contract: 1
usd:
  # Where this bundle's plugInfo.json lives, relative to the bundle root.
  plug_info: plugin/resources/usdVrm/plugInfo.json
tests:
  smoke:
    - tests/fixtures/minimal.vrm
    - tests/fixtures/vrm0_minimal.vrm
    - tests/fixtures/materials.vrm
    - tests/fixtures/textures.vrm
    - tests/fixtures/multiskin_ibm.vrm
    - tests/fixtures/names.vrm
    - tests/fixtures/expressions.vrm
    - tests/fixtures/vrm0_expressions.vrm
    - tests/fixtures/lookat.vrm
    - tests/fixtures/springbone.vrm
    - tests/fixtures/constraints.vrm
    - tests/fixtures/animation.vrm
    - tests/fixtures/badext.vrm
    - tests/fixtures/shared_accessor.vrm
    - tests/fixtures/unordered_skel.vrm
    - tests/fixtures/vrm0_frontbake.vrm
    # Redistributable real-world corpus assets (see tests/corpus/CORPUS.md +
    # tests/corpus/manifest.json). Vendored VRM 1.0 spec samples.
    - tests/corpus/spec-samples/vrm1/seed-san/Seed-san.vrm
    - tests/corpus/spec-samples/vrm1/constraint-twist/VRM1_Constraint_Twist_Sample.vrm
    # Malformed-but-recoverable negatives: each imports with exactly one coded
    # warning (see tests/corpus/generated/negative-manifest.json). The codes are
    # asserted by tests/test_usdvrm_negative.py.
    - tests/corpus/generated/malformed/out_of_range_joints.vrm          # VRM111
    - tests/corpus/generated/malformed/unmapped_humanoid_node.vrm       # VRM140
    - tests/corpus/generated/malformed/duplicate_humanoid_bone.vrm      # VRM141
    - tests/corpus/generated/malformed/oob_expression_morph.vrm         # VRM151
    - tests/corpus/generated/malformed/missing_spring_collider_group.vrm # VRM190
  roundtrip:
    - tests/fixtures/minimal.vrm
  negative:
    - tests/fixtures/invalid.vrm
    # Unreadable containers: Usd.Stage.Open must fail (importer surfaces VRM003).
    - tests/corpus/generated/malformed/malformed_glb_json.vrm
    - tests/corpus/generated/malformed/dangling_texture_index.vrm
    - tests/corpus/generated/malformed/nonfinite_transform.vrm
    - tests/corpus/generated/malformed/nonobject_vrm_extension.vrm
